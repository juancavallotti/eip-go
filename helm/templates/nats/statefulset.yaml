{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "octo.nats.serviceName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  # Governing headless service: gives each replica a stable identity
  # (nats-0.<headless>) that cluster routes rely on when scaling to multi-node.
  # This is why NATS is a StatefulSet even as a single core server, per the
  # official chart's guidance.
  serviceName: {{ include "octo.nats.headlessServiceName" . }}
  selector:
    matchLabels:
      {{- include "octo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.nats.image.pullPolicy }}
          # Core NATS only (no JetStream): ephemeral pub/sub, so no volume. -m
          # exposes the HTTP monitoring endpoint used by the readiness probe.
          args: ["-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.nats.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
