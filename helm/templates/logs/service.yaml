apiVersion: v1
kind: Service
metadata:
  name: {{ include "octo.logs.serviceName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: logs
spec:
  # ClusterIP: the log query API stays internal; the platform BFF fronts it.
  type: ClusterIP
  selector:
    {{- include "octo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: logs
  ports:
    - name: http
      port: {{ .Values.logs.service.port }}
      targetPort: {{ .Values.logs.service.port }}
