# Core NATS for the local dev cluster. Mirrors helm/templates/nats/ (a StatefulSet
# governed by a headless service for stable identity, plus a client service that
# NATS_URL points at). Pub-sub only (no JetStream), so there's no volume. The
# public nats image is pulled by the k3d node on first use, like postgres:16-alpine.
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: octo-dev
spec:
  # Client service: what NATS_URL (nats://nats:4222) resolves to.
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: octo-dev
spec:
  # Headless: governs the StatefulSet so the replica gets stable per-pod DNS for
  # the cluster-route discovery NATS uses when scaling out.
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: octo-dev
spec:
  serviceName: nats-headless
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # -m exposes the HTTP monitoring endpoint used by the readiness probe.
          args: ["-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 3
            periodSeconds: 10
