# The log-aggregator (octo-logs image). Consumes log events from the NATS
# internal.logs subject as a competing consumer and persists them to Postgres via
# DATABASE_URL. Listens on 8091 for /healthz and the (read) query API.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs
  namespace: octo-dev
spec:
  # Replicas are safe to scale: the NATS queue group makes them competing
  # consumers, so each record is stored exactly once.
  replicas: 1
  selector:
    matchLabels:
      app: logs
  template:
    metadata:
      labels:
        app: logs
    spec:
      containers:
        - name: logs
          # Built by `task cluster:images` and loaded via `k3d image import`.
          image: octo-logs:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: PORT
              value: "8091"
            - name: DATABASE_URL
              value: postgres://octo:octo@postgres:5432/octo?sslmode=disable
            # In-cluster NATS broker (deploy/k8s/nats.yaml) carrying internal.logs.
            - name: NATS_URL
              value: nats://nats:4222
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: logs
  namespace: octo-dev
spec:
  # ClusterIP: the log query API stays internal; the platform BFF fronts it.
  type: ClusterIP
  selector:
    app: logs
  ports:
    - name: http
      port: 8091
      targetPort: 8091
