name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/go.work
      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: task release-check
      - run: task build

  # Publish the self-contained standalone "try Octo" image to public Docker Hub,
  # multi-arch so it runs natively on Apple Silicon and x86. Runs only on version
  # tags (the v* tags release-please creates), after the release checks pass.
  publish-standalone:
    needs: release-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/standalone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/juancavallotti/octo:${{ steps.ver.outputs.version }}
            docker.io/juancavallotti/octo:latest
