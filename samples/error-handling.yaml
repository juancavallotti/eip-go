service:
  name: error-handling

# Demonstrates the runtime's error handling:
#   1. handle-errors block — inline recovery: run `process`, and on error run the
#      `error` chain, which sees the failure as vars.error.
#   2. flow-level error path — a sibling `error:` chain on a root flow; on a
#      processing error the message is redirected there (recovery: its output
#      becomes the flow result).
#   3. vars.error = { message, flow, block } is exposed to the error path.
#   4. vars.httpStatus controls the HTTP response status code.
#
# Both flows call an unreachable upstream — the `payments` http-client points at a
# discard port, so every `rest` call fails to connect. No external server needed.
#
# Try it:
#   go run ./cli -config samples/error-handling.yaml
#   curl -i -X POST localhost:8080/inline    -d '{"amount": 10}'   # 200, degraded body
#   curl -i -X POST localhost:8080/flowlevel -d '{"amount": 10}'   # 502, error body
#
# Or drive a single flow without the HTTP server:
#   go run ./cli invoke --config samples/error-handling.yaml \
#     --flow charge-flowlevel --data '{"amount": 10}'

connectors:
  - name: api
    type: http
    settings:
      port: 8080
  - name: payments
    type: http-client
    settings:
      baseURL: http://127.0.0.1:9   # discard port -> every call fails to connect
      timeout: 1s

flows:
  # 1. Inline recovery with handle-errors. The charge fails, so the error chain
  #    runs: it reads vars.error.message and returns a friendly body. Because the
  #    error chain succeeds, the flow completes normally (HTTP 200).
  - name: charge-inline
    source:
      connector: api
      type: http
      settings:
        path: /inline
    process:
      - type: handle-errors
        name: charge
        process:
          - type: rest
            name: call-charge
            settings:
              connector: payments
              method: POST
              path: /charges
              body: '{"amount": body.amount}'
        error:
          - type: set-payload
            settings:
              value: '{"status": "degraded", "reason": vars.error.message}'

  # 2. Flow-level error path. No handle-errors here: the rest call errors, so the
  #    message is redirected to the flow `error:` chain, which sets a 502 status
  #    and an error body the caller receives.
  - name: charge-flowlevel
    source:
      connector: api
      type: http
      settings:
        path: /flowlevel
    process:
      - type: rest
        name: call-charge
        settings:
          connector: payments
          method: POST
          path: /charges
          body: '{"amount": body.amount}'
    error:
      - type: set-variable
        settings: { name: httpStatus, value: "502" }
      - type: set-payload
        settings:
          value: >
            {
              "error":       vars.error.message,
              "failedBlock": vars.error.block,
              "flow":        vars.error.flow
            }
